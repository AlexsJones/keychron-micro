# Default preset -- what a fresh clone gets.
#
# Copied to config.toml by `make install`. Edit config.toml, not this file:
# config.toml is yours and gitignored, this is the tracked starting point.
#
# Only the demo key is bound. Everything else in scripts/ is real and ready --
# uncomment what you want. Nothing here launches an agent until you say so.
#
# These keycodes are Keychron's factory numpad map, so this works on a Q0 Max
# straight out of the box with the pad never reprogrammed.

[web]
# http://127.0.0.1:7373 -- shows what is bound, names the key you press, and
# edits this file. Localhost only, always: it rewrites this config, and every
# `run` here is a script the daemon executes on a keypress. 0 disables it.
port = 7373

[harness]
# The coding agent the agent scripts open. Change it here, once, and every
# script follows -- they read $KEYCHRON_HARNESS and $KEYCHRON_HARNESS_ARGS from
# the daemon rather than naming an agent themselves.
#
# {repo} expands to this repo, so args can name files that ship alongside this
# config without hardcoding where you cloned it.
#
# For codex instead:
#     command = "codex"
#     args = ["--dangerously-bypass-approvals-and-sandbox"]
command = "claude"
args = ["--settings", "{repo}/claude-pad-settings.json", "--dangerously-skip-permissions"]

# `key`   is the evdev name -- press the key with the web UI open and it tells
#         you, or run `make learn`.
# `label` is documentation only. Record what the keycap actually shows: the
#         legends and the keycodes have nothing to do with each other, and in
#         six months you will not remember which pictogram was numpad 8.
# `run`   is relative to this repo, so a clone reproduces the setup as-is.

[[bind]]
key = "KEY_KP5"
label = "numpad 5 -- the demo key"
run = "scripts/demo.sh"

